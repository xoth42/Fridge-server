# Alertmanager configuration template
# This tracked file is a safe example/default for reference in git.
# Runtime config with secrets is generated by install.sh to:
#   config/alertmanager/alertmanager.runtime.yml
# Edit alertmanager.yml.template to change alert routing; re-run install.sh to apply.
#
# Receivers:
#   Slack:  basic webhook, formatting improved in Phase B
#   Email:  via SendGrid SMTP relay

global:
  smtp_smarthost: 'smtp.sendgrid.net:587'
  smtp_from: 'alerts@fridge.zickers.us'
  smtp_auth_username: 'apikey'
  smtp_auth_password: 'SG.your-api-key-here'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'fridge']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'all-channels'

receivers:
  - name: 'all-channels'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK'
        channel: '#fridge-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Fridge:* {{ .Labels.fridge }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}
    email_configs:
      - to: 'alerts@example.com'
        send_resolved: true
        headers:
          Subject: '[Fridge Alert] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'fridge']
