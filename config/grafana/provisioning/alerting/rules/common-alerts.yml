apiVersion: 1

groups:
  - orgId: 1
    name: Common Baseline
    folder: Baseline Alerts
    interval: 60s
    rules:
      - uid: staleness-all-fridges
        title: "Fridge Data Stale (>10 min)"
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: warning
          tier: baseline
        annotations:
          summary: "No data from {{ $$labels.instance }} for {{ $$values.A }} minutes"
        data:
          - refId: A
            datasourceUid: P1809F7CD0C75ACF3
            relativeTimeRange:
              from: 900
              to: 0
            model:
              expr: '(time() - last_push_timestamp_seconds{job="sensor_data"}) / 60'
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 900
              to: 0
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
                  unloadEvaluator:
                    type: lt
                    params:
                      - 10
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
