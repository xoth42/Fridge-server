apiVersion: 1

groups:
  - orgId: 1
    name: Manny Baseline
    folder: Baseline Alerts
    interval: 60s
    rules:
      - uid: manny-mxc-high
        title: "Manny \u2014 MXC Temperature High"
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
          fridge: fridge-manny
          tier: baseline
        annotations:
          summary: "Manny MXC temp is {{ $$values.A }} K (threshold: 0.030 K)"
        data:
          - refId: A
            datasourceUid: P1809F7CD0C75ACF3
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: 'ch6_t_kelvin{instance="fridge-manny"}'
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.030
                  unloadEvaluator:
                    type: lt
                    params:
                      - 0.030
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
