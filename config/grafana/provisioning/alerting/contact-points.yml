apiVersion: 1

contactPoints:
  - orgId: 1
    name: lab-email
    receivers:
      - uid: cp-lab-email
        type: email
        settings:
          addresses: $ALERT_EMAIL_TO
          singleEmail: true
          subject: >-
            {{ or .CommonLabels.rulename .CommonLabels.alertname "Alert" }}
            — {{ or .CommonLabels.fridge .CommonLabels.instance "Unknown" }}
          message: |-
            {{ range .Alerts -}}
            <b>Rule:</b> {{ or .Labels.rulename .Labels.alertname "Alert" }}<br>
            <b>Fridge:</b> {{ or .Labels.fridge .Labels.instance "Unknown" }}<br>
            {{ if .Annotations.summary -}}
            <b>Summary:</b> {{ .Annotations.summary }}<br>
            {{ end -}}
            <br>
            {{ end -}}

  - orgId: 1
    name: lab-slack
    receivers:
      - uid: cp-lab-slack
        type: slack
        settings:
          url: $SLACK_WEBHOOK_URL
          title: >-
            {{ .CommonLabels.alertname }}
          text: |-
            {{ range .Alerts -}}
            {{ .Annotations.summary }}
            {{ end -}}
