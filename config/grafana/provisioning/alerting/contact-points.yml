apiVersion: 1

contactPoints:
  - orgId: 1
    name: lab-email
    receivers:
      - uid: cp-lab-email
        type: email
        settings:
          addresses: $ALERT_EMAIL_TO
          singleEmail: true
          subject: >-
            [{{ .CommonLabels.severity | upper }}]
            {{ coalesce .CommonLabels.rulename .CommonLabels.alertname }}
            — {{ coalesce .CommonLabels.fridge .CommonLabels.instance }}
          message: |-
            {{ range .Alerts -}}
            <b>Rule:</b> {{ coalesce .Labels.rulename .Labels.alertname }}<br>
            <b>Fridge:</b> {{ coalesce .Labels.fridge .Labels.instance }}<br>
            <b>Severity:</b> {{ .Labels.severity }}<br>
            {{ if .Annotations.summary -}}
            <b>Summary:</b> {{ .Annotations.summary }}<br>
            {{ end -}}
            <br>
            {{ end -}}

  - orgId: 1
    name: lab-slack
    receivers:
      - uid: cp-lab-slack
        type: slack
        settings:
          url: $SLACK_WEBHOOK_URL
          title: >-
            [{{ .CommonLabels.alertname }}]
            {{ .CommonLabels.fridge }}{{ .CommonLabels.instance }}
          text: |-
            {{ range .Alerts -}}
            *[{{ .Labels.severity }}]* {{ .Annotations.summary }}
            {{ end -}}
