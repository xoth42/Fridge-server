name: ci

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # gettext provides envsubst, which install.sh uses to generate configs.
          sudo apt-get install -y gettext

      - name: Create CI .env
        # Sets the minimum required variables. SMTP and Slack credentials are
        # intentionally empty — alertmanager will start but silently fail delivery,
        # which is acceptable for smoke-testing the stack.
        run: |
          echo 'GF_ADMIN_USER=admin'                              > .env
          echo 'GF_ADMIN_PASSWORD=ci-admin-password'             >> .env
          echo 'DOMAIN=localhost'                                 >> .env
          echo 'GRAFANA_PUBLIC_URL=http://localhost:3000'         >> .env
          echo 'PROMETHEUS_RETENTION_TIME=15d'                   >> .env
          echo 'PROMETHEUS_RETENTION_SIZE=2GB'                   >> .env
          echo 'SMTP_HOST=smtp.sendgrid.net'                     >> .env
          echo 'SMTP_PORT=587'                                    >> .env
          echo 'SMTP_USER=apikey'                                 >> .env
          echo 'SMTP_PASSWORD='                                   >> .env
          echo 'SMTP_FROM=ci@localhost'                           >> .env
          echo 'ALERT_EMAIL_TO=ci@example.com'                   >> .env
          echo 'SLACK_WEBHOOK_URL=https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/placeholder' >> .env
          echo 'SLACK_CHANNEL=#fridge-alerts'                    >> .env
          echo 'ALLOWED_PUSH_CIDR='                              >> .env
          echo 'WATCHTOWER_NOTIFY_EMAIL='                        >> .env

      - name: Run install script
        # CI=true causes install.sh to skip: firewall, ddclient config,
        # lab user creation, and TLS. Only core services are started.
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Push synthetic fridge metrics
        run: python3 testdata/pushtestmetrics.py --pushgateway-url http://localhost:9091

      - name: Wait for Prometheus scrape cycle
        # Prometheus scrape interval is 15s; 16s guarantees at least one cycle.
        run: sleep 16

      - name: Verify Prometheus has the metric
        run: |
          RESPONSE=$(curl -sS 'http://localhost:9090/api/v1/query?query=%7Bjob%3D%22sensor_data%22%7D')
          python3 testdata/check_prometheus_metric.py "$RESPONSE"

      - name: Verify Grafana provisioning
        run: |
          AUTH="admin:ci-admin-password"
          DS=$(curl -sS -u "$AUTH" http://localhost:3000/api/datasources/name/Prometheus)
          python3 testdata/check_grafana_datasource.py "$DS"

          DASHES=$(curl -sS -u "$AUTH" 'http://localhost:3000/api/search?query=Fridge%20Test')
          python3 testdata/check_grafana_dashboard.py "$DASHES"

      - name: Tear down stack
        if: always()
        run: docker compose down
