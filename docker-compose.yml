services:

  # ---------------------------------------------------------------------------
  # Prometheus — metrics storage and evaluation engine
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fridge-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-15GB}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing to Slack and email
  # alertmanager.yml is generated by install.sh from alertmanager.yml.template.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fridge-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --log.level=info
      - --storage.path=/alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pushgateway — HTTP endpoint for Windows fridge machines to push metrics
  # Port 9091 should be firewalled to the college network CIDR via install.sh.
  # ---------------------------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: fridge-pushgateway
    ports:
      - "9091:9091"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and unified alert rule management
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.5
    container_name: fridge-grafana
    environment:
      # Admin credentials — override in .env before any public exposure.
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}

      # Allow iframe embedding for WordPress panel integration.
      - GF_SECURITY_ALLOW_EMBEDDING=true

      # Anonymous read-only access (Viewer role) — lab members can view
      # dashboards without logging in, and panels can be embedded publicly.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

      # Public URL — used in alert notification links and redirects.
      - GF_SERVER_ROOT_URL=${GRAFANA_PUBLIC_URL:-http://localhost:3000}
      - GF_SERVER_DOMAIN=${DOMAIN:-localhost}

      # SMTP via SendGrid relay — used for Grafana's own alert notifications.
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.sendgrid.net}:${SMTP_PORT:-587}
      - GF_SMTP_USER=${SMTP_USER:-apikey}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-alerts@example.com}
      - GF_SMTP_FROM_NAME=Fridge Monitor
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      # Named volume persists the SQLite DB (alert rules, user edits, accounts).
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy with automatic Let's Encrypt TLS
  # Only starts with: docker compose --profile production up -d
  # ddclient.conf must be generated by install.sh before first start.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.8.4
    container_name: fridge-caddy
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # persists TLS certificates across restarts
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - grafana
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ddclient — keeps name.com DNS A record updated with this server's IP
  # Only starts with: docker compose --profile production up -d
  # ddclient.conf generated by install.sh from ddclient.conf.template.
  # ---------------------------------------------------------------------------
  ddclient:
    image: lscr.io/linuxserver/ddclient:3.11.2
    container_name: fridge-ddclient
    profiles: ["production"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config/ddclient/ddclient.conf:/config/ddclient.conf:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Watchtower — monitor-only; emails when new image versions are available.
  # Never auto-updates containers (WATCHTOWER_MONITOR_ONLY=true).
  # Checks every Monday at 04:00.
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: fridge-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * MON
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${SMTP_FROM:-alerts@example.com}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${WATCHTOWER_NOTIFY_EMAIL:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${SMTP_HOST:-smtp.sendgrid.net}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${SMTP_PORT:-587}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${SMTP_USER:-apikey}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_TLS_SKIP_VERIFY=false
    networks:
      - fridge-monitoring
    restart: unless-stopped


networks:
  fridge-monitoring:
    driver: bridge


volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  caddy_data:
  caddy_config:
