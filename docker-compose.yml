services:

  # ---------------------------------------------------------------------------
  # Prometheus — metrics storage and evaluation engine
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fridge-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-15GB}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing to Slack and email
  # alertmanager.runtime.yml is generated by install.sh from alertmanager.yml.template.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fridge-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --log.level=info
      - --storage.path=/alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.runtime.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pushgateway — HTTP endpoint for Windows fridge machines to push metrics
  # Port 9091 should be firewalled to the college network CIDR via install.sh.
  # ---------------------------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: fridge-pushgateway
    ports:
      - "9091:9091"
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and unified alert rule management
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: fridge-grafana
    environment:
      # Admin credentials — override in .env before any public exposure.
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}

      # Allow iframe embedding for WordPress panel integration.
      - GF_SECURITY_ALLOW_EMBEDDING=true

      # Anonymous read-only access (Viewer role) — lab members can view
      # dashboards without logging in, and panels can be embedded publicly.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

      # Public URL — used in alert notification links and redirects.
      - GF_SERVER_ROOT_URL=${GRAFANA_PUBLIC_URL:-http://localhost:3000}
      - GF_SERVER_DOMAIN=fridge.zickers.us

      # SMTP relay — used for Grafana's own alert notifications.
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}:${SMTP_PORT:-587}
      - GF_SMTP_USER=${SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GMAIL_APP_PASSWORD:-${SMTP_PASSWORD:-}}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-${SMTP_USER:-alerts@example.com}}
      - GF_SMTP_FROM_NAME=Fridge Monitor
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS

      # Values used by Grafana alerting provisioning files.
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-noreply@example.com}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/NOTCONFIGURED/NOTCONFIGURED/notconfigured}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      # Named volume persists the SQLite DB (alert rules, user edits, accounts).
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Alert API — stateless proxy for simplified alert management
  # ---------------------------------------------------------------------------
  alert-api:
    build: ./alert-api
    container_name: fridge-alert-api
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SA_TOKEN=${GRAFANA_SA_TOKEN}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - grafana
    networks:
      - fridge-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy with automatic Let's Encrypt TLS
  # Only starts with: docker compose --profile production up -d
  # ---------------------------------------------------------------------------
  caddy:
    build: ./config/caddy   # custom image with DuckDNS DNS-01 plugin
    container_name: fridge-caddy
    profiles: ["production"]
    ports:
      - "8443:8443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./alert-ui:/srv/alert-ui:ro
      - caddy_data:/data        # persists TLS certificates across restarts
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NAMEDOTCOM_USER=${NAMEDOTCOM_USER}
      - NAMEDOTCOM_API_TOKEN=${NAMEDOTCOM_API_TOKEN}
    depends_on:
      - grafana
      - alert-api
    networks:
      - fridge-monitoring
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # duckdns — keeps zickers-fridge.duckdns.org updated with this server's IP.
  # name.com fridge.zickers.us has a CNAME → zickers-fridge.duckdns.org.
  # Only starts with: docker compose --profile production up -d
  # ---------------------------------------------------------------------------
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: fridge-duckdns
    profiles: ["production"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SUBDOMAINS=${DUCKDNS_SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=false
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Watchtower — monitor-only; emails when new image versions are available.
  # Never auto-updates containers (WATCHTOWER_MONITOR_ONLY=true).
  # Checks every Monday at 04:00.
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: fridge-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * MON
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${SMTP_FROM:-${SMTP_USER:-alerts@example.com}}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${WATCHTOWER_NOTIFY_EMAIL:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${SMTP_HOST:-smtp.gmail.com}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${SMTP_PORT:-587}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${SMTP_USER:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${GMAIL_APP_PASSWORD:-${SMTP_PASSWORD:-}}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_TLS_SKIP_VERIFY=false
    networks:
      - fridge-monitoring
    restart: unless-stopped


networks:
  fridge-monitoring:
    driver: bridge


volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  caddy_data:
  caddy_config:
